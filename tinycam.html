<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Landmarks Demo - Fixed Alignment</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family: monospace;
}

#video,#overlay{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}

#toggle{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:72px;
    height:72px;
    border-radius:50%;
    border:none;
    background:white;
    cursor:pointer;
    z-index:10;
    display: none; 
}

#debug-hud {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.85);
    color: #00FF33;
    padding: 15px;
    border-radius: 5px;
    font-size: 11px;
    line-height: 1.4;
    pointer-events: none;
    z-index: 20;
    max-width: 85%;
    border: 1px solid #00FF33;
    word-break: break-all;
}
</style>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>

<button id="toggle"></button>
<div id="debug-hud">Initializing system...</div>

<script type="module">
import { FilesetResolver, FaceLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/vision_bundle.mjs";

const video = document.getElementById("video");
const canvas = document.getElementById("overlay");
const toggle = document.getElementById("toggle");
const debugHud = document.getElementById("debug-hud");
const ctx = canvas.getContext("2d");

let faceLandmarker;
let showLandmarks = true;
let lastVideoTime = -1;

function logDebug(message, isError = false) {
    const timestamp = new Date().toLocaleTimeString();
    const formattedMessage = `[${timestamp}] ${message}`;
    if (isError) {
        debugHud.innerHTML += `<br><span style="color: #FF3333;">❌ ${formattedMessage}</span>`;
    } else {
        debugHud.innerHTML += `<br>ℹ️ ${formattedMessage}`;
    }
}

async function initMediaPipe() {
    try {
        logDebug("Loading compiled WASM engine binaries...");
        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
        );
        
        logDebug("Downloading Model Asset bundle...");
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                delegate: "CPU" 
            },
            runningMode: "VIDEO",
            numFaces: 1
        });
        
        logDebug("MediaPipe pipeline active!");
        toggle.style.display = "block";
        
    } catch (error) {
        logDebug(`MediaPipe Error: ${error.name} -> ${error.message}`, true);
    }
}

// Requesting standard mobile responsive resolution constraints
logDebug("Requesting camera pipeline access...");
navigator.mediaDevices.getUserMedia({
    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" }
}).then(stream => {
    logDebug("Camera attached successfully.");
    video.srcObject = stream;
    
    video.addEventListener("loadeddata", () => {
        video.play().then(() => {
            logDebug("Playback active.");
        }).catch(err => {
            logDebug(`Playback blocked: ${err.message}`, true);
        });
        
        loop();
        initMediaPipe();
    });
}).catch(err => {
    logDebug(`Camera block: ${err.name} - ${err.message}`, true);
});

toggle.onclick = () => {
    showLandmarks = !showLandmarks;
    toggle.style.background = showLandmarks ? "white" : "#555";
};

// Global parameters computed every frame to handle object-fit: cover scaling maps
let transformConfig = { scaleX: 1, scaleY: 1, offsetX: 0, offsetY: 0 };

function calculateObjectFitCoverTransform() {
    const videoWidth = video.videoWidth;
    const videoHeight = video.videoHeight;
    const viewWidth = window.innerWidth;
    const viewHeight = window.innerHeight;

    if (!videoWidth || !videoHeight) return;

    // Determine ratios of screen to original media dimensions
    const videoRatio = videoWidth / videoHeight;
    const viewRatio = viewWidth / viewHeight;

    let renderWidth, renderHeight;

    // Emulate the browser's native CSS "object-fit: cover" algorithm
    if (viewRatio > videoRatio) {
        renderWidth = viewWidth;
        renderHeight = viewWidth / videoRatio;
    } else {
        renderWidth = viewHeight * videoRatio;
        renderHeight = viewHeight;
    }

    // Compute pixel offsets where video leaks off screen edges
    const offsetX = (viewWidth - renderWidth) / 2;
    const offsetY = (viewHeight - renderHeight) / 2;

    transformConfig = {
        scaleX: renderWidth,
        scaleY: renderHeight,
        offsetX: offsetX,
        offsetY: offsetY
    };
}

function drawLandmarks(points) {
    if (!showLandmarks) return;
    ctx.fillStyle = "#00FFCC"; 

    for (const p of points) {
        ctx.beginPath();
        
        // Map the normalized coordinate (0-1) to the calculated object-fit container space, 
        // then apply the offset context to account for cropping bounds.
        const canvasX = p.x * transformConfig.scaleX + transformConfig.offsetX;
        const canvasY = p.y * transformConfig.scaleY + transformConfig.offsetY;

        ctx.arc(canvasX, canvasY, 2, 0, Math.PI * 2);
        ctx.fill();
    }
}

function loop() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Calculate updated layout transformations on every frame step 
    // to dynamically adapt if the viewport sizes shake or reorient.
    if (video.readyState >= 2) {
        calculateObjectFitCoverTransform();
    }

    if (faceLandmarker && video.currentTime !== lastVideoTime && video.readyState >= 2) {
        lastVideoTime = video.currentTime;
        const result = faceLandmarker.detectForVideo(video, performance.now());
        if (result && result.faceLandmarks && result.faceLandmarks.length > 0) {
            for (const landmarks of result.faceLandmarks) {
                drawLandmarks(landmarks);
            }
        }
    }
    requestAnimationFrame(loop);
}
</script>

</body>
</html>
